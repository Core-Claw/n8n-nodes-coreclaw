<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">n8n-nodes-coreclaw</title>
  <desc id="desc">Use CoreClaw API v2 in n8n: an action node with 34 operations plus a callback trigger node.</desc>
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#F7F2E8" stroke-opacity=".055"/>
    </pattern>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#74E0C1"/><stop offset="1" stop-color="#43B9B0"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="390" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="1200" height="390" rx="32" fill="#121827"/>
    <rect width="1200" height="390" rx="32" fill="url(#grid)"/>
    <circle cx="1107" cy="56" r="112" fill="#FF7458" fill-opacity=".08"/>
    <circle cx="1048" cy="340" r="138" fill="#63D3BE" fill-opacity=".06"/>

    <g transform="translate(68 48)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
      <text x="0" y="16" fill="#A9B1C2" font-size="17" font-weight="700" letter-spacing="3">N8N COMMUNITY NODE · CORECLAW V2</text>
      <rect x="0" y="34" width="56" height="6" rx="3" fill="#FF7458"/>
      <text x="0" y="132" fill="#F7F2E8" font-size="76" font-weight="780" letter-spacing="-3">n8n-nodes</text>
      <text x="0" y="206" fill="#F7F2E8" font-size="66" font-weight="760" letter-spacing="-3">-coreclaw</text>
      <rect id="title-highlight" x="0" y="224" width="310" height="18" rx="4" fill="#63D3BE" fill-opacity=".82"/>
      <text x="0" y="278" fill="#D6DCE7" font-size="26" font-weight="520">34 operations + a callback trigger.</text>
      <text x="0" y="322" fill="#7F8A9F" font-size="15" font-weight="650" letter-spacing="1.7">ACTION NODE · TRIGGER NODE · /api/v2</text>
    </g>

    <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
      <g transform="translate(790 46) rotate(5 150 96)">
        <rect x="8" y="10" width="300" height="192" rx="20" fill="#080D17" fill-opacity=".38"/>
        <rect width="300" height="192" rx="20" fill="#F7F2E8"/>
        <rect x="22" y="22" width="56" height="8" rx="4" fill="#FF7458"/>
        <text x="22" y="58" fill="#121827" font-size="18" font-weight="760">NODE PANEL</text>
        <g transform="translate(22 74)" font-size="11" font-weight="700">
          <rect width="122" height="30" rx="9" fill="#182334"/><circle cx="16" cy="15" r="6" fill="#FF7458"/><text x="30" y="19" fill="#F7F2E8">CoreClaw</text>
          <rect x="134" width="122" height="30" rx="9" fill="#182334"/><circle cx="150" cy="15" r="6" fill="#6A62D9"/><text x="164" y="19" fill="#F7F2E8">Trigger</text>
          <rect y="42" width="256" height="30" rx="9" fill="url(#mint)"/><text x="16" y="61" fill="#10313A">Run and Get Results</text>
          <rect y="80" width="122" height="30" rx="9" fill="#10313A" fill-opacity=".08"/><text x="12" y="99" fill="#172033">Run Worker</text>
          <rect x="134" y="80" width="122" height="30" rx="9" fill="#10313A" fill-opacity=".08"/><text x="146" y="99" fill="#172033">Export CSV</text>
        </g>
      </g>
      <g transform="translate(710 210) rotate(-5 150 70)">
        <rect x="8" y="10" width="300" height="140" rx="18" fill="#080D17" fill-opacity=".4"/>
        <rect width="300" height="140" rx="18" fill="url(#mint)"/>
        <text x="22" y="38" fill="#10313A" font-size="16" font-weight="760">34 OPERATIONS</text>
        <g transform="translate(22 52)">
          <rect width="80" height="26" rx="7" fill="#10313A" fill-opacity=".12"/><text x="40" y="18" text-anchor="middle" fill="#10313A" font-size="11" font-weight="700">Store</text>
          <rect x="92" width="80" height="26" rx="7" fill="#10313A" fill-opacity=".12"/><text x="132" y="18" text-anchor="middle" fill="#10313A" font-size="11" font-weight="700">Worker</text>
          <rect x="184" width="80" height="26" rx="7" fill="#10313A" fill-opacity=".12"/><text x="224" y="18" text-anchor="middle" fill="#10313A" font-size="11" font-weight="700">Task</text>
          <rect y="34" width="80" height="26" rx="7" fill="#10313A" fill-opacity=".12"/><text x="40" y="52" text-anchor="middle" fill="#10313A" font-size="11" font-weight="700">Run</text>
          <rect x="92" y="34" width="80" height="26" rx="7" fill="#10313A" fill-opacity=".12"/><text x="132" y="52" text-anchor="middle" fill="#10313A" font-size="11" font-weight="700">Result</text>
          <rect x="184" y="34" width="80" height="26" rx="7" fill="#FF7458"/><text x="224" y="52" text-anchor="middle" fill="#F7F2E8" font-size="11" font-weight="700">Export</text>
        </g>
      </g>
    </g>
  </g>
</svg>
